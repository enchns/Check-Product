<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<script src="https://unpkg.com/html5-qrcode"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Product</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #22c55e;
    --green-dark: #16a34a;
    --green-light: #dcfce7;
    --orange: #f97316;
    --orange-light: #fff7ed;
    --red: #ef4444;
    --red-light: #fef2f2;
    --yellow: #eab308;
    --yellow-light: #fefce8;
    --bg: #f0fdf4;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
    --radius: 16px;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
    padding-bottom: 40px;
  }

  .header {
    background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 20px rgba(22,163,74,0.3);
  }

  .header-icon {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .header h1 {
    color: white;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }

  .header p {
    color: rgba(255,255,255,0.75);
    font-size: 12px;
    font-weight: 500;
  }

  .container { max-width: 560px; margin: 0 auto; padding: 24px 16px; }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::before {
    content: '';
    width: 3px; height: 14px;
    background: var(--green);
    border-radius: 2px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .required-star { color: var(--red); margin-left: 2px; }

  .input-wrap {
    position: relative;
    margin-bottom: 20px;
  }

  input[type=text], input[type=date] {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    background: #f8fafc;
    outline: none;
    transition: all 0.2s;
  }

  input[type=text]:focus, input[type=date]:focus {
    border-color: var(--green);
    background: white;
    box-shadow: 0 0 0 4px rgba(34,197,94,0.1);
  }

  .input-suffix {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    pointer-events: none;
  }

  .scan-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(34,197,94,0.3);
    margin-top: 4px;
  }

  .scan-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(34,197,94,0.4); }
  .scan-btn:active { transform: translateY(0); }

  .field-display {
    background: #f8fafc;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 20px;
    min-height: 46px;
  }

  .field-display.empty { color: var(--muted); font-style: italic; font-weight: 400; }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .badge-fresh { background: var(--green-light); color: var(--green-dark); }
  .badge-frozen { background: #eff6ff; color: #1d4ed8; }
  .badge-dry { background: #fef9c3; color: #854d0e; }

  .alert-box {
    border-radius: 12px;
    padding: 16px;
    margin-top: 8px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .alert-expired {
    background: var(--red-light);
    border: 1.5px solid #fca5a5;
  }

  .alert-critical {
    background: var(--orange-light);
    border: 1.5px solid #fdba74;
  }

  .alert-warning {
    background: var(--yellow-light);
    border: 1.5px solid #fde047;
  }

  .alert-ok {
    background: var(--green-light);
    border: 1.5px solid #86efac;
  }

  .alert-icon { font-size: 22px; line-height: 1; flex-shrink: 0; margin-top: 1px; }

  .alert-title {
    font-size: 13px;
    font-weight: 800;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .alert-expired .alert-title { color: var(--red); }
  .alert-critical .alert-title { color: #c2410c; }
  .alert-warning .alert-title { color: #854d0e; }
  .alert-ok .alert-title { color: var(--green-dark); }

  .alert-msg {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.5;
  }

  .alert-expired .alert-msg { color: #b91c1c; }
  .alert-critical .alert-msg { color: #c2410c; }
  .alert-warning .alert-msg { color: #854d0e; }
  .alert-ok .alert-msg { color: #15803d; }

  .msltc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .msltc-item {
    background: #f8fafc;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }

  .msltc-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .msltc-value {
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
  }

  .msltc-unit {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
  }

  .days-bar {
    margin-top: 16px;
    padding: 14px;
    background: #f8fafc;
    border-radius: 10px;
    border: 1.5px solid var(--border);
  }

  .days-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .days-bar-track {
    height: 10px;
    background: #e2e8f0;
    border-radius: 10px;
    overflow: hidden;
  }

  .days-bar-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.5s ease, background 0.3s;
  }

  .not-found {
    text-align: center;
    padding: 20px;
    color: var(--red);
    font-size: 14px;
    font-weight: 600;
  }

  .history-list { display: flex; flex-direction: column; gap: 10px; }

  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: #f8fafc;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 13px;
  }

  .history-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .history-name { font-weight: 600; flex: 1; }
  .history-time { color: var(--muted); font-size: 11px; }
  .history-status { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 8px; }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 20px;
    font-weight: 500;
  }

  .save-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #1e293b, #334155);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .save-btn:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(30,41,59,0.3); }

  .reset-btn {
    width: 100%;
    padding: 12px;
    background: white;
    color: var(--muted);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }

  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }

  #product-section { display: none; }
  #result-section { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🔍</div>
  <div>
    <h1>Check Product</h1>
    <p>Scan & verifikasi expired date produk</p>
  </div>
</div>

<div class="container">

  <!-- SCAN SECTION -->
 <div class="input-wrap">
  <label>QR CODE / SKU <span class="required-star">*</span></label>

  <div style="display:flex; gap:8px;">
    <input type="text" id="qr-input" placeholder="Ketik atau scan QR Code..." autocomplete="off" />

    <button onclick="startScanner()" 
      style="
        min-width:48px;
        border:none;
        border-radius:10px;
        background:#22c55e;
        color:white;
        font-size:18px;
        cursor:pointer;
      ">
      📷
    </button>
  </div>
<div id="reader" style="width:100%; margin-top:10px; display:none;"></div>
</div>
    <button class="scan-btn" onclick="scanProduct()">
  🔎 Cari Produk
</button>
    <div id="not-found" class="not-found" style="display:none"></div>
  </div>

  <!-- PRODUCT INFO SECTION -->
  <div class="card" id="product-section">
    <div class="card-title">Informasi Produk</div>

    <label>PRODUCT NAME</label>
    <div class="field-display" id="disp-name">—</div>

    <label>STORAGE HANDLING</label>
    <div class="field-display" id="disp-storage">—</div>

    <div class="msltc-grid">
      <div class="msltc-item">
        <div class="msltc-label">MSLTC</div>
        <div class="msltc-value" id="disp-msltc">—</div>
        <div class="msltc-unit">hari</div>
      </div>
      <div class="msltc-item">
        <div class="msltc-label">MSLOR</div>
        <div class="msltc-value" id="disp-mslor">—</div>
        <div class="msltc-unit">hari</div>
      </div>
      <div class="msltc-item">
        <div class="msltc-label">MSLOD</div>
        <div class="msltc-value" id="disp-mslod">—</div>
        <div class="msltc-unit">hari</div>
      </div>
    </div>

    <hr class="divider">

    <div class="input-wrap">
      <label>EXPIRED DATE <span class="required-star">*</span></label>
      <input type="date" id="ed-input" oninput="checkExpiry()" />
    </div>

    <!-- ALERT RESULT -->
    <div id="result-section"></div>

    <!-- DAYS BAR -->
    <div class="days-bar" id="days-bar" style="display:none">
      <div class="days-bar-label">
        <span>Sisa hari</span>
        <span id="days-label">—</span>
      </div>
      <div class="days-bar-track">
        <div class="days-bar-fill" id="days-fill"></div>
      </div>
    </div>

    <hr class="divider">
    <button class="save-btn" id="save-btn" onclick="saveRecord()" disabled>
      💾 Simpan Record
    </button>
    <button class="reset-btn" onclick="resetForm()">↺ Reset / Scan Baru</button>
  </div>

  <!-- HISTORY -->
  <div class="card">
    <div class="card-title">Riwayat Scan Session Ini</div>
    <div id="history-list" class="history-list">
      <div class="empty-state">Belum ada scan dalam sesi ini</div>
    </div>
  </div>

</div>


<script>
let MASTER = {};
let isLoaded = false;
let currentProduct = null;
let history = [];

async function loadProducts() {
  try {
    const res = await fetch('./products.json');
    const data = await res.json();

    Object.keys(data).forEach(key => {
      MASTER[key] = {
        name: data[key].product_name,
        msltc: data[key].msltc,
        mslor: data[key].mslor,
        mslod: data[key].mslod,
        storage: data[key].rack_storage_name
      };
    });

    isLoaded = true;

  } catch (err) {
    console.error('ERROR LOAD JSON:', err);
  }
}
loadProducts();

function scanProduct() {

  if (!isLoaded) {
    alert('Data belum siap...');
    return;
  }

  const qr = document.getElementById('qr-input').value.trim();
  const product = MASTER[qr];

  if (!product) {
    document.getElementById('not-found').innerText = 'Produk tidak ditemukan';
    document.getElementById('not-found').style.display = 'block';
    document.getElementById('product-section').style.display = 'none';
    return;
  }

  document.getElementById('not-found').style.display = 'none';
  document.getElementById('product-section').style.display = 'block';

  currentProduct = {
    ...product,
    sku_number: qr
  };

  document.getElementById('disp-name').innerText = product.name;
  document.getElementById('disp-storage').innerText = product.storage;
  document.getElementById('disp-msltc').innerText = product.msltc;
  document.getElementById('disp-mslor').innerText = product.mslor;
  document.getElementById('disp-mslod').innerText = product.mslod;
}

function checkExpiry() {
  if (!currentProduct) return;
  
  const edVal = document.getElementById('ed-input').value;
  const resultSection = document.getElementById('result-section');
  const daysBar = document.getElementById('days-bar');
  const saveBtn = document.getElementById('save-btn');

  if (!edVal) {
    resultSection.innerHTML = '';
    resultSection.style.display = 'none';
    daysBar.style.display = 'none';
    saveBtn.disabled = true;
    return;
  }

  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const ed = new Date(edVal);
  ed.setHours(0, 0, 0, 0);

  const diffMs = ed - today;
  const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
  const msltc = currentProduct.msltc ?? 0;

  let alertHTML = '';
  let barColor = '';
  let barPct = 0;
  let statusLabel = '';
  let dotColor = '';

  if (diffDays < 0) {
    // Already expired
    const expiredDays = Math.abs(diffDays);
    alertHTML = `<div class="alert-box alert-expired">
      <div class="alert-icon">🚫</div>
      <div>
        <div class="alert-title">PRODUK SUDAH EXPIRED!</div>
        <div class="alert-msg">Produk ini sudah kadaluarsa ${expiredDays} hari yang lalu. Segera lakukan bad stock dan jangan di-order.</div>
      </div>
    </div>`;
    barColor = '#ef4444';
    barPct = 100;
    statusLabel = 'EXPIRED';
    dotColor = '#ef4444';
  } else if (diffDays === 0) {
    alertHTML = `<div class="alert-box alert-expired">
      <div class="alert-icon">🚫</div>
      <div>
        <div class="alert-title">EXPIRED HARI INI!</div>
        <div class="alert-msg">Produk ini expired hari ini. Segera bad stock dan jangan di-order.</div>
      </div>
    </div>`;
    barColor = '#ef4444';
    barPct = 100;
    statusLabel = 'EXPIRED';
    dotColor = '#ef4444';
  } else if (diffDays <= msltc) {
    // Critical: days remaining <= MSLTC
    alertHTML = `<div class="alert-box alert-critical">
      <div class="alert-icon">⏳</div>
      <div>
        <div class="alert-title">⚠️ PRODUK MENDEKATI KADALUARSA!</div>
        <div class="alert-msg">Produk mendekati kadaluarsa, sisa <strong>${diffDays} hari lagi</strong> sebelum Expired. Tolong segera di bad stock sebelum ke order.</div>
      </div>
    </div>`;
    barColor = '#f97316';
    barPct = msltc > 0 ? Math.round((diffDays / msltc) * 100) : 50;
    statusLabel = 'NEAR EXPIRED';
    dotColor = '#f97316';
  } else {
    // OK
    alertHTML = `<div class="alert-box alert-ok">
      <div class="alert-icon">✅</div>
      <div>
        <div class="alert-title">PRODUK MASIH BAIK</div>
        <div class="alert-msg">Sisa <strong>${diffDays} hari</strong> sebelum expired. Produk layak untuk diorder.</div>
      </div>
    </div>`;
    barColor = '#22c55e';
    barPct = 100;
    statusLabel = 'OK';
    dotColor = '#22c55e';
  }

  resultSection.innerHTML = alertHTML;
  resultSection.style.display = 'block';

  document.getElementById('days-label').textContent = diffDays + ' hari';
  document.getElementById('days-fill').style.width = barPct + '%';
  document.getElementById('days-fill').style.background = barColor;
  daysBar.style.display = 'block';

  saveBtn.disabled = false;
  
  currentProduct._ed = edVal;
  currentProduct._diffDays = diffDays;
  currentProduct._status = statusLabel;
  currentProduct._dotColor = dotColor;
}

function saveRecord() {
  if (!currentProduct || !currentProduct._ed) return;
  
  const now = new Date();
  const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  
  history.unshift({
    sku: currentProduct.sku_number,
    name: currentProduct.name,
    ed: currentProduct._ed,
    diffDays: currentProduct._diffDays,
    status: currentProduct._status,
    dotColor: currentProduct._dotColor,
    time: timeStr
  });

  renderHistory();
}

function renderHistory() {
  const container = document.getElementById('history-list');
  if (history.length === 0) {
    container.innerHTML = '<div class="empty-state">Belum ada scan</div>';
    return;
  }
  container.innerHTML = history.map(h => `
    <div class="history-item">
      <div class="history-dot" style="background:${h.dotColor}"></div>
      <div style="flex:1">${h.name}</div>
      <div>${h.time}</div>
    </div>
  `).join('');
}

function resetForm() {
  document.getElementById('qr-input').value = '';
  document.getElementById('not-found').style.display = 'none';
  document.getElementById('product-section').style.display = 'none';
  currentProduct = null;
}
</script>
</body>
</html>
